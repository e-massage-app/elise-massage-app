<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads - Authentification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        #status {
            font-size: 1rem;
            margin: 0;
            opacity: 0.9;
        }
        .error {
            color: #ff6b6b;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .success {
            color: #51cf66;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(81, 207, 102, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(81, 207, 102, 0.3);
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" style="display: block;">
            <div class="spinner"></div>
            <h2>Authentification Google Ads</h2>
            <p id="status">Traitement en cours...</p>
        </div>
        
        <div id="success" style="display: none;">
            <div class="icon">✅</div>
            <h2>Connexion réussie !</h2>
            <p>Vous êtes maintenant connecté à Google Ads.</p>
            <p style="font-size: 0.9rem; opacity: 0.8;">Cette fenêtre va se fermer automatiquement...</p>
        </div>
        
        <div id="error" style="display: none;">
            <div class="icon">❌</div>
            <h2>Erreur d'authentification</h2>
            <div id="error-message" class="error"></div>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 1rem;">Cette fenêtre va se fermer automatiquement...</p>
        </div>
    </div>

    <script>
        console.log('🔗 === Page de callback OAuth chargée ===');
        
        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');
        
        console.log('📋 Paramètres URL:', { code: !!code, error, errorDescription });
        
        // Éléments DOM
        const loadingDiv = document.getElementById('loading');
        const successDiv = document.getElementById('success');
        const errorDiv = document.getElementById('error');
        const statusEl = document.getElementById('status');
        const errorMessageEl = document.getElementById('error-message');
        
        function showSuccess() {
            loadingDiv.style.display = 'none';
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
        
        function showError(message) {
            loadingDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorMessageEl.textContent = message;
        }
        
        function closeWindow(delay = 2000) {
            setTimeout(() => {
                try {
                    window.close();
                } catch (e) {
                    console.log('Impossible de fermer la fenêtre automatiquement');
                }
            }, delay);
        }
        
        // Traitement des résultats OAuth
        if (error) {
            console.error('❌ Erreur OAuth:', error, errorDescription);
            
            let errorMessage = 'Erreur d\'authentification';
            if (error === 'access_denied') {
                errorMessage = 'Accès refusé. Vous avez annulé la connexion.';
            } else if (errorDescription) {
                errorMessage = errorDescription;
            } else {
                errorMessage = `Erreur: ${error}`;
            }
            
            showError(errorMessage);
            
            // Informer la fenêtre parent
            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage({
                        type: 'OAUTH_ERROR',
                        error: errorMessage
                    }, window.location.origin);
                    console.log('📤 Erreur envoyée à la fenêtre parent');
                } catch (e) {
                    console.error('❌ Erreur envoi message:', e);
                }
            }
            
            closeWindow(3000);
            
        } else if (code) {
            console.log('✅ Code d\'autorisation reçu');
            statusEl.textContent = 'Code d\'autorisation reçu avec succès !';
            
            // Un petit délai pour que l'utilisateur voie le message
            setTimeout(() => {
                showSuccess();
                
                // Informer la fenêtre parent
                if (window.opener && !window.opener.closed) {
                    try {
                        window.opener.postMessage({
                            type: 'OAUTH_SUCCESS',
                            code: code
                        }, window.location.origin);
                        console.log('📤 Code envoyé à la fenêtre parent');
                    } catch (e) {
                        console.error('❌ Erreur envoi message:', e);
                    }
                }
                
                closeWindow(1500);
            }, 800);
            
        } else {
            console.error('❌ Aucun paramètre valide trouvé');
            showError('Aucun paramètre d\'authentification trouvé dans l\'URL.');
            
            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage({
                        type: 'OAUTH_ERROR',
                        error: 'Paramètres manquants'
                    }, window.location.origin);
                } catch (e) {
                    console.error('❌ Erreur envoi message:', e);
                }
            }
            
            closeWindow(3000);
        }
        
        // Gestion de la fermeture manuelle
        window.addEventListener('beforeunload', () => {
            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage({
                        type: 'OAUTH_ERROR',
                        error: 'Fenêtre fermée manuellement'
                    }, window.location.origin);
                } catch (e) {
                    // Ignore les erreurs lors de la fermeture
                }
            }
        });
        
        console.log('✅ Script de callback initialisé');
    </script>
</body>
</html>
